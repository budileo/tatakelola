<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Pengguna - Administrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

<div class="flex flex-col md:flex-row">
    <!-- Sidebar -->
    <div class="bg-gray-800 shadow-xl h-16 fixed bottom-0 md:relative md:h-screen z-10 w-full md:w-64">
        <div class="md:mt-12 md:w-64 md:fixed md:left-0 md:top-0 content-center md:content-start text-left justify-between">
            <ul class="list-reset flex flex-row md:flex-col py-0 md:py-3 px-1 md:px-2 text-center md:text-left">
                <li class="mr-3 flex-1 back-to-index-menu-admin">
                    <a href="../index.html" class="block py-1 md:py-3 pl-1 align-middle text-gray-400 hover:text-white border-b-2 border-gray-800 hover:border-blue-500">
                        <i class="fas fa-arrow-left pr-0 md:pr-3"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-gray-400 md:text-gray-200 block md:inline-block">Kembali ke Index</span>
                    </a>
                </li>
                <li class="mr-3 flex-1">
                    <a href="index.html" class="block py-1 md:py-3 pl-1 align-middle text-gray-400 hover:text-white border-b-2 border-gray-800 hover:border-blue-600">
                        <i class="fas fa-home pr-0 md:pr-3"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-gray-400 block md:inline-block">Admin Dashboard</span>
                    </a>
                </li>
                <li class="mr-3 flex-1">
                    <a href="departments.html" class="block py-1 md:py-3 pl-1 align-middle text-gray-400 hover:text-white border-b-2 border-gray-800 hover:border-orange-500">
                        <i class="fas fa-briefcase pr-0 md:pr-3"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-gray-400 block md:inline-block">Departemen</span>
                    </a>
                </li>
                <li class="mr-3 flex-1">
                    <a href="users.html" class="block py-1 md:py-3 pl-1 align-middle text-white no-underline border-b-2 border-pink-500">
                        <i class="fas fa-users pr-0 md:pr-3 text-pink-500"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-white block md:inline-block">Pengguna</span>
                    </a>
                </li>
                <li class="mr-3 flex-1">
                    <a href="settings.html" class="block py-1 md:py-3 pl-1 align-middle text-gray-400 hover:text-white border-b-2 border-gray-800 hover:border-green-500">
                        <i class="fas fa-cog pr-0 md:pr-3"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-gray-400 block md:inline-block">Pengaturan</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content flex-1 bg-gray-100 mt-12 md:mt-2 pb-24 md:pb-5">
        <div class="bg-blue-800 p-2 shadow text-xl text-white flex justify-between">
            <h3 class="font-bold pl-2">Manajemen Pengguna</h3>
            <button onclick="logout()" class="text-sm bg-red-500 hover:bg-red-600 px-3 py-1 rounded">Logout</button>
        </div>

        <div class="p-6">
            <h2 class="text-2xl font-bold mb-6">Daftar Pengguna / Karyawan</h2>
            
            <div class="bg-white rounded shadow overflow-x-auto">
                <table class="min-w-full leading-normal">
                    <thead>
                        <tr>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Nama & Email</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Departemen</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Role</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Status</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Rows populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="../js/auth.js"></script>
<script src="js/admin-core.js"></script>
<script>
    let users = [];

    document.addEventListener('DOMContentLoaded', async () => {
        const currentUser = await window.checkAdminAuth();
        if(currentUser) {
            loadUsers();
        }
    });

    function loadUsers() {
        users = JSON.parse(localStorage.getItem('vitta_mock_users')) || [];
        renderTable();
    }

    function saveUsers() {
        localStorage.setItem('vitta_mock_users', JSON.stringify(users));
        loadUsers();
    }

    function renderTable() {
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';
        
        if (users.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="px-5 py-5 border-b border-gray-200 bg-white text-sm text-center text-gray-500">Belum ada karyawan terdaftar. Silakan bagikan Link Invite ke karyawan Anda.</td></tr>`;
            return;
        }

        users.forEach(u => {
            const tr = document.createElement('tr');
            
            let statusBadge = '';
            if (u.status === 'PENDING') statusBadge = '<span class="relative inline-block px-3 py-1 font-semibold text-orange-900 leading-tight"><span aria-hidden class="absolute inset-0 bg-orange-200 opacity-50 rounded-full"></span><span class="relative">PENDING</span></span>';
            else if (u.status === 'ACTIVE') statusBadge = '<span class="relative inline-block px-3 py-1 font-semibold text-green-900 leading-tight"><span aria-hidden class="absolute inset-0 bg-green-200 opacity-50 rounded-full"></span><span class="relative">AKTIF</span></span>';
            
            let actions = '';
            if (u.status === 'PENDING') {
                actions = `<button onclick="approveUser('${u.id}')" class="bg-green-500 hover:bg-green-700 text-white font-bold py-1 px-2 rounded text-xs">Approve</button>`;
            } else {
                actions = `<button class="text-gray-400 cursor-not-allowed py-1 px-2 text-xs">Approved</button>`;
            }

            tr.innerHTML = `
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <p class="text-gray-900 whitespace-no-wrap font-bold">${u.name}</p>
                    <p class="text-gray-600 text-xs">${u.email}</p>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <p class="text-gray-900 whitespace-no-wrap">${u.department_name || '-'}</p>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <p class="text-gray-900 whitespace-no-wrap">${u.role || 'STAF'}</p>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    ${statusBadge}
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    ${actions}
                    <button onclick="deleteUser('${u.id}')" class="text-red-500 hover:text-red-700 ml-2"><i class="fas fa-trash"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function approveUser(id) {
        if(confirm('Approve karyawan ini?')) {
            const index = users.findIndex(u => u.id === id);
            if (index > -1) {
                users[index].status = 'ACTIVE';
                saveUsers();
            }
        }
    }

    function deleteUser(id) {
        if(confirm('Hapus karyawan ini?')) {
            users = users.filter(u => u.id !== id);
            saveUsers();
        }
    }
</script>
</body>
</html>
