<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator Dashboard - Vitta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Include Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

<div class="flex flex-col md:flex-row">
    <!-- Sidebar -->
    <div class="bg-gray-800 shadow-xl h-16 fixed bottom-0 md:relative md:h-screen z-10 w-full md:w-64">
        <div class="md:mt-12 md:w-64 md:fixed md:left-0 md:top-0 content-center md:content-start text-left justify-between">
            <ul class="list-reset flex flex-row md:flex-col py-0 md:py-3 px-1 md:px-2 text-center md:text-left">
                <li class="mr-3 flex-1">
                    <a href="index.html" class="block py-1 md:py-3 pl-1 align-middle text-white no-underline hover:text-white border-b-2 border-blue-600">
                        <i class="fas fa-home pr-0 md:pr-3 text-blue-600"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-white md:text-white block md:inline-block">Admin Dashboard</span>
                    </a>
                </li>
                <li class="mr-3 flex-1">
                    <a href="users.html" class="block py-1 md:py-3 pl-1 align-middle text-gray-400 hover:text-white border-b-2 border-gray-800 hover:border-pink-500">
                        <i class="fas fa-users pr-0 md:pr-3"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-gray-400 md:text-gray-200 block md:inline-block">Pengguna</span>
                    </a>
                </li>
                <li class="mr-3 flex-1">
                    <a href="menus.html" class="block py-1 md:py-3 pl-1 align-middle text-gray-400 hover:text-white border-b-2 border-gray-800 hover:border-purple-500">
                        <i class="fas fa-list pr-0 md:pr-3"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-gray-400 md:text-gray-200 block md:inline-block">Manajemen Menu</span>
                    </a>
                </li>
                <li class="mr-3 flex-1">
                    <a href="settings.html" class="block py-1 md:py-3 pl-1 align-middle text-gray-400 hover:text-white border-b-2 border-gray-800 hover:border-green-500">
                        <i class="fas fa-cog pr-0 md:pr-3"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-gray-400 md:text-gray-200 block md:inline-block">Pengaturan</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content flex-1 bg-gray-100 mt-12 md:mt-2 pb-24 md:pb-5">
        <div class="bg-blue-800 p-2 shadow text-xl text-white">
            <h3 class="font-bold pl-2">Modul Administrator</h3>
        </div>

        <div class="flex flex-wrap p-6">
            <div class="w-full md:w-1/2 xl:w-1/3 p-3">
                <div class="bg-white border-b-4 border-blue-500 rounded-lg shadow-xl p-5">
                    <div class="flex flex-row items-center">
                        <div class="flex-shrink pr-4">
                            <div class="rounded-full p-5 bg-blue-600"><i class="fas fa-users fa-2x fa-inverse"></i></div>
                        </div>
                        <div class="flex-1 text-right md:text-center">
                            <h5 class="font-bold uppercase text-gray-500">Total Pengguna</h5>
                            <h3 class="font-bold text-3xl" id="total-users">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="w-full md:w-1/2 xl:w-1/3 p-3">
                <div class="bg-white border-b-4 border-yellow-500 rounded-lg shadow-xl p-5">
                    <div class="flex flex-row items-center">
                        <div class="flex-shrink pr-4">
                            <div class="rounded-full p-5 bg-yellow-600"><i class="fas fa-user-clock fa-2x fa-inverse"></i></div>
                        </div>
                        <div class="flex-1 text-right md:text-center">
                            <h5 class="font-bold uppercase text-gray-500">Pending Approval</h5>
                            <h3 class="font-bold text-3xl" id="pending-users">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
        
        <div class="p-6">
            <h2 class="text-xl font-bold mb-4">Aksi Cepat</h2>
            <div class="flex gap-4">
                <a href="users.html" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Approve Pengguna</a>
                <a href="settings.html" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">Buat Link Invite</a>
            </div>
        </div>
    </div>
</div>

<script src="../js/auth.js"></script>
<script src="js/admin-core.js"></script>
<script>
    // Load Dashboard stats
    document.addEventListener('DOMContentLoaded', async () => {
        if(window.checkAdminAuth) await window.checkAdminAuth();
        if(window.loadDashboardStats) await window.loadDashboardStats();
    });
</script>
</body>
</html>
