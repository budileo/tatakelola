<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Departemen - Administrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

<div class="flex flex-col md:flex-row">
    <!-- Sidebar -->
    <div class="bg-gray-800 shadow-xl h-16 fixed bottom-0 md:relative md:h-screen z-10 w-full md:w-64">
        <div class="md:mt-12 md:w-64 md:fixed md:left-0 md:top-0 content-center md:content-start text-left justify-between">
            <ul class="list-reset flex flex-row md:flex-col py-0 md:py-3 px-1 md:px-2 text-center md:text-left">
                <li class="mr-3 flex-1 back-to-index-menu-admin">
                    <a href="../index.html" class="block py-1 md:py-3 pl-1 align-middle text-gray-400 hover:text-white border-b-2 border-gray-800 hover:border-blue-500">
                        <i class="fas fa-arrow-left pr-0 md:pr-3"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-gray-400 block md:inline-block">Kembali ke Index</span>
                    </a>
                </li>
                <li class="mr-3 flex-1">
                    <a href="index.html" class="block py-1 md:py-3 pl-1 align-middle text-gray-400 hover:text-white border-b-2 border-gray-800 hover:border-blue-600">
                        <i class="fas fa-home pr-0 md:pr-3"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-gray-400 block md:inline-block">Admin Dashboard</span>
                    </a>
                </li>
                <li class="mr-3 flex-1">
                    <a href="departments.html" class="block py-1 md:py-3 pl-1 align-middle text-white no-underline border-b-2 border-orange-500">
                        <i class="fas fa-briefcase pr-0 md:pr-3 text-orange-500"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-white block md:inline-block">Departemen</span>
                    </a>
                </li>
                <li class="mr-3 flex-1">
                    <a href="users.html" class="block py-1 md:py-3 pl-1 align-middle text-gray-400 hover:text-white border-b-2 border-gray-800 hover:border-pink-500">
                        <i class="fas fa-users pr-0 md:pr-3"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-gray-400 block md:inline-block">Pengguna</span>
                    </a>
                </li>
                <li class="mr-3 flex-1">
                    <a href="settings.html" class="block py-1 md:py-3 pl-1 align-middle text-gray-400 hover:text-white border-b-2 border-gray-800 hover:border-green-500">
                        <i class="fas fa-cog pr-0 md:pr-3"></i><span class="pb-1 md:pb-0 text-xs md:text-base text-gray-400 block md:inline-block">Pengaturan</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content flex-1 bg-gray-100 mt-12 md:mt-2 pb-24 md:pb-5 h-screen overflow-y-auto">
        <div class="bg-blue-800 p-2 shadow text-xl text-white flex justify-between">
            <h3 class="font-bold pl-2">Manajemen Departemen</h3>
            <button onclick="logout()" class="text-sm bg-red-500 hover:bg-red-600 px-3 py-1 rounded">Logout</button>
        </div>

        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Daftar Departemen</h2>
                <button onclick="openModal('add')" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                    <i class="fas fa-plus mr-2"></i> Tambah Departemen
                </button>
            </div>

            <!-- Table -->
            <div class="bg-white rounded shadow overflow-x-auto">
                <table class="min-w-full leading-normal">
                    <thead>
                        <tr>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Logo & Nama</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Kontak Utama</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Link Invite Unik</th>
                            <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="deptTableBody">
                        <tr><td colspan="4" class="text-center py-4">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Form -->
<div id="deptModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex justify-center items-center z-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl max-h-screen overflow-y-auto">
        <div class="flex justify-between items-center p-4 border-b">
            <h3 class="text-xl font-bold" id="modalTitle">Tambah Departemen Baru</h3>
            <button onclick="closeModal()" class="text-gray-500 hover:text-gray-800"><i class="fas fa-times fa-lg"></i></button>
        </div>
        <form id="deptForm" onsubmit="saveDepartment(event)" class="p-6">
            <input type="hidden" id="deptId">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Nama Departemen *</label>
                    <input type="text" id="deptName" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                    <input type="email" id="deptEmail" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Alamat Lengkap</label>
                    <textarea id="deptAddress" rows="2" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"></textarea>
                </div>
                
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">No Telp</label>
                    <input type="text" id="deptPhone" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">No Whatsapp</label>
                    <input type="text" id="deptWa" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-gray-700 text-sm font-bold mb-2">URL Logo (Opsional)</label>
                    <input type="text" id="deptLogo" placeholder="https://..." class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
            </div>
            
            <div class="flex justify-end pt-4 border-t">
                <button type="button" onclick="closeModal()" class="mr-2 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded">Batal</button>
                <button type="submit" id="btnSave" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Simpan</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/supabase-db.js"></script>
<script src="js/admin-core.js"></script>
<script>
    let departments = [];

    document.addEventListener('DOMContentLoaded', async () => {
        const user = await window.checkAdminAuth();
        if(user) {
            if(user.role !== 'OWNER') {
                Swal.fire('Akses Ditolak', 'Hanya Owner yang bisa mengakses Manajemen Departemen.', 'error');
                window.location.href = 'index.html';
                return;
            }
            // Wait for DB ready
            if (window.supabaseClient) {
                loadDepartments();
            } else {
                window.addEventListener('vitta-saas-ready', loadDepartments);
            }
        }
    });

    async function loadDepartments() {
        try {
            const { data, error } = await window.supabaseClient.from('akt_departments').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            departments = data || [];
            renderTable();
        } catch (err) {
            console.error(err);
            Swal.fire('Error', 'Gagal memuat departemen.', 'error');
        }
    }

    function renderTable() {
        const tbody = document.getElementById('deptTableBody');
        tbody.innerHTML = '';
        
        if (departments.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4">Belum ada departemen.</td></tr>';
            return;
        }

        const currentUser = window.VITTA_USER;
        const currentProfile = window.VITTA_PROFILE;

        departments.forEach(dept => {
            const tr = document.createElement('tr');
            
            const inviteLink = window.location.origin + window.location.pathname.replace('administrator/departments.html', '') + 'register-invite.html?token=' + dept.invite_token;
            const logoHtml = dept.logo_url ? `<img src="${dept.logo_url}" class="w-10 h-10 rounded-full mr-3 object-cover">` : `<div class="w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center mr-3 font-bold">${dept.name.charAt(0)}</div>`;
            
            const isActive = currentProfile && currentProfile.department_id === dept.id;
            const switchBtn = isActive 
                ? `<span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-1 rounded">Aktif</span>` 
                : `<button onclick="switchDepartment('${dept.id}')" class="bg-gray-800 hover:bg-gray-900 text-white text-xs font-bold py-1 px-3 rounded shadow">Masuk (Switch)</button>`;

            tr.innerHTML = `
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <div class="flex items-center">
                        ${logoHtml}
                        <div class="ml-3">
                            <p class="text-gray-900 whitespace-no-wrap font-bold">${dept.name}</p>
                            <p class="text-gray-600 text-xs">${dept.address || '-'}</p>
                        </div>
                    </div>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <p class="text-gray-900 whitespace-no-wrap"><i class="fas fa-envelope mr-1 text-gray-400"></i> ${dept.email || '-'}</p>
                    <p class="text-gray-900 whitespace-no-wrap"><i class="fab fa-whatsapp mr-1 text-green-500"></i> ${dept.whatsapp || '-'}</p>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <div class="flex items-center">
                        <input type="text" value="${inviteLink}" readonly class="bg-gray-100 text-xs p-1 w-32 border rounded mr-2">
                        <button onclick="copyLink('${inviteLink}')" class="text-blue-500 hover:text-blue-800"><i class="fas fa-copy"></i></button>
                    </div>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm text-center">
                    <div class="flex flex-col items-center justify-center gap-2">
                        ${switchBtn}
                        <div class="flex justify-center mt-1">
                            <button onclick="openModal('edit', '${dept.id}')" class="text-blue-600 hover:text-blue-900 mr-3 text-xs"><i class="fas fa-edit"></i> Edit</button>
                            <button onclick="deleteDept('${dept.id}')" class="text-red-600 hover:text-red-900 text-xs"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function switchDepartment(deptId) {
        if (!window.VITTA_USER || !window.supabaseClient) return;
        try {
            Swal.fire({title: 'Berpindah Departemen...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            
            const { error } = await window.supabaseClient
                .from('akt_user_profiles')
                .update({ department_id: deptId })
                .eq('id', window.VITTA_USER.id);
            
            if (error) throw error;
            
            // Perbarui Profile dan Redirect ke Index Utama
            const { data: newProfile } = await window.supabaseClient.from('akt_user_profiles').select('*, akt_departments(*)').eq('id', window.VITTA_USER.id).single();
            window.VITTA_PROFILE = newProfile;
            
            Swal.fire({icon: 'success', title: 'Berhasil', text: 'Berpindah ke departemen berhasil!', timer: 1000, showConfirmButton: false}).then(() => {
                window.location.href = '../index.html';
            });
        } catch (err) {
            Swal.fire('Error', 'Gagal berpindah departemen: ' + err.message, 'error');
        }
    }

    function copyLink(link) {
        navigator.clipboard.writeText(link).then(() => {
            Swal.fire({icon: 'success', title: 'Disalin!', text: 'Link undangan berhasil disalin', timer: 1500, showConfirmButton: false});
        });
    }

    function openModal(mode, id = null) {
        document.getElementById('deptModal').classList.remove('hidden');
        const form = document.getElementById('deptForm');
        form.reset();
        
        if (mode === 'edit') {
            document.getElementById('modalTitle').innerText = 'Edit Departemen';
            const dept = departments.find(d => d.id === id);
            if (dept) {
                document.getElementById('deptId').value = dept.id;
                document.getElementById('deptName').value = dept.name;
                document.getElementById('deptEmail').value = dept.email || '';
                document.getElementById('deptAddress').value = dept.address || '';
                document.getElementById('deptPhone').value = dept.phone || '';
                document.getElementById('deptWa').value = dept.whatsapp || '';
                document.getElementById('deptLogo').value = dept.logo_url || '';
            }
        } else {
            document.getElementById('modalTitle').innerText = 'Tambah Departemen Baru';
            document.getElementById('deptId').value = '';
        }
    }

    function closeModal() {
        document.getElementById('deptModal').classList.add('hidden');
    }

    async function saveDepartment(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        btn.disabled = true;
        btn.innerText = 'Menyimpan...';

        const id = document.getElementById('deptId').value;
        const deptData = {
            name: document.getElementById('deptName').value,
            email: document.getElementById('deptEmail').value,
            address: document.getElementById('deptAddress').value,
            phone: document.getElementById('deptPhone').value,
            whatsapp: document.getElementById('deptWa').value,
            logo_url: document.getElementById('deptLogo').value,
        };

        try {
            if (id) {
                const { error } = await window.supabaseClient.from('akt_departments').update(deptData).eq('id', id);
                if (error) throw error;
                Swal.fire({icon: 'success', title: 'Berhasil', text: 'Departemen diperbarui', timer: 1500, showConfirmButton: false});
            } else {
                deptData.user_id = window.VITTA_USER.id;
                deptData.invite_token = 'INV-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                
                const { error, data } = await window.supabaseClient.from('akt_departments').insert([deptData]).select();
                if (error) throw error;
                
                // CREATE COA DEFAULTS FOR THIS DEPARTMENT
                if (data && data.length > 0) {
                    const newDeptId = data[0].id;
                    const defaultCoa = [
                        { name: 'Kas Kecil', code: '1-10001', category: 'Kas & Bank', "group": 'Aset', is_system: true, department_id: newDeptId, user_id: deptData.user_id },
                        { name: 'Piutang Usaha', code: '1-10100', category: 'Akun Piutang', "group": 'Aset', is_system: true, department_id: newDeptId, user_id: deptData.user_id },
                        { name: 'Persediaan Barang', code: '1-10200', category: 'Persediaan', "group": 'Aset', is_system: true, department_id: newDeptId, user_id: deptData.user_id },
                        { name: 'Hutang Usaha', code: '2-20100', category: 'Akun Hutang', "group": 'Kewajiban', is_system: true, department_id: newDeptId, user_id: deptData.user_id },
                        { name: 'Modal Pemilik', code: '3-30000', category: 'Ekuitas', "group": 'Ekuitas', is_system: true, department_id: newDeptId, user_id: deptData.user_id },
                        { name: 'Pendapatan Penjualan', code: '4-40000', category: 'Pendapatan', "group": 'Pendapatan', is_system: true, department_id: newDeptId, user_id: deptData.user_id },
                        { name: 'Beban Pokok Penjualan', code: '5-50000', category: 'Harga Pokok Penjualan', "group": 'Beban', is_system: true, department_id: newDeptId, user_id: deptData.user_id },
                        { name: 'Biaya Gaji', code: '6-60100', category: 'Beban Operasional', "group": 'Beban', is_system: false, department_id: newDeptId, user_id: deptData.user_id },
                    ];
                    await window.supabaseClient.from('akt_coa_accounts').insert(defaultCoa);
                }

                Swal.fire({icon: 'success', title: 'Berhasil', text: 'Departemen dibuat! Silakan klik "Masuk (Switch)" untuk mengaksesnya.', showConfirmButton: true});
            }
            loadDepartments();
            closeModal();
        } catch (err) {
            Swal.fire('Error', 'Gagal menyimpan departemen: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerText = 'Simpan';
        }
    }

    async function deleteDept(id) {
        if(confirm('Apakah Anda yakin ingin menghapus departemen ini? Seluruh data Akuntansi akan terhapus secara permanen.')) {
            try {
                const { error } = await window.supabaseClient.from('akt_departments').delete().eq('id', id);
                if (error) throw error;
                Swal.fire({icon: 'success', title: 'Terhapus', text: 'Departemen dihapus.', timer: 1500, showConfirmButton: false});
                loadDepartments();
            } catch (err) {
                Swal.fire('Error', 'Gagal menghapus: ' + err.message, 'error');
            }
        }
    }
</script>
    <script src='../js/theme.js'></script>
</body>
</html>
