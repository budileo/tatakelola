<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventori Stok - Vitta ERP</title>
    <meta name="description" content="Kelola data inventori, pergerakan stok, dan penyesuaian stok.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { dark: { 900: '#111827', 800: '#1f2937', 700: '#374151', 600: '#4b5563' }, primary: '#3b82f6', accent: '#8b5cf6' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .product-table tbody tr:hover { background: rgba(55, 65, 81, 0.3); }
    </style>
</head>
<body class="bg-dark-900 text-gray-100 font-sans min-h-screen flex">

    <div id="sidebar-container" class="shrink-0"></div>

    <div class="flex-1 flex flex-col h-screen overflow-hidden bg-dark-900">
        <!-- Header -->
        <header class="bg-dark-800 border-b border-dark-700 p-4 md:p-6 flex justify-between items-center shrink-0 sticky top-0 z-10">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="mr-4 text-gray-400 hover:text-white lg:hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-white tracking-tight">Inventori Gudang</h1>
                    <p class="text-xs md:text-sm text-gray-400 hidden md:block">Monitoring stok, pergerakan, dan penyesuaian barang</p>
                </div>
            </div>
            <div>
                <button onclick="openAdjustmentModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-medium transition-all duration-200 shadow-lg shadow-blue-500/20 flex items-center text-sm hover:shadow-blue-500/40 hover:-translate-y-0.5">
                    <svg class="w-5 h-5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Penyesuaian Stok
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6">

<!-- ==================== VIEW: LIST ==================== -->
<div id="viewList" class="max-w-7xl mx-auto space-y-6">
    <!-- Stats Cards -->
    <div id="statsCards" class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <!-- Rendered by JS -->
    </div>

    <!-- Inventory Table -->
    <div class="bg-dark-800 border border-dark-700 rounded-xl overflow-hidden shadow-sm product-table">
        <div class="p-4 border-b border-dark-700 flex justify-between items-center">
            <h3 class="text-lg font-bold text-white">Kartu Stok Produk</h3>
            <div class="flex gap-2">
                <input type="text" id="fSearchInv" placeholder="Cari produk..." class="bg-dark-900 border border-dark-700 rounded-lg px-3 py-1.5 text-sm w-64" onkeyup="renderInventoryTable()">
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm text-gray-300">
                <thead class="bg-dark-700/50 text-gray-400 border-b border-dark-700 text-xs uppercase tracking-wider">
                    <tr>
                        <th class="px-4 py-3 font-semibold">SKU</th>
                        <th class="px-4 py-3 font-semibold">Nama Produk</th>
                        <th class="px-4 py-3 font-semibold text-center">Stok</th>
                        <th class="px-4 py-3 font-semibold text-right">Nilai HPP</th>
                        <th class="px-4 py-3 font-semibold text-right">Total Nilai</th>
                    </tr>
                </thead>
                <tbody id="tbodyInventory" class="divide-y divide-dark-700">
                    <!-- Rendered by JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

        </main>
    </div>

    <!-- MODAL: Penyesuaian Stok -->
    <div id="modalAdjustment" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center backdrop-blur-sm">
        <div class="bg-dark-800 border border-dark-700 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl animate-fade-in-up">
            <div class="p-6 border-b border-dark-700 flex justify-between items-center sticky top-0 bg-dark-800/90 backdrop-blur-sm">
                <h3 class="text-xl font-bold text-white">Penyesuaian Stok (Adjustment)</h3>
                <button onclick="closeAdjustmentModal()" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Produk</label>
                    <select id="adjProduct" class="w-full bg-dark-900 border border-dark-700 rounded-xl px-4 py-2.5 text-white"></select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Stok Saat Ini</label>
                        <input type="text" id="adjCurrentStock" class="w-full bg-dark-900 border border-dark-700 rounded-xl px-4 py-2.5 text-gray-500" readonly>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Penyesuaian (Qty)</label>
                        <input type="number" id="adjQty" class="w-full bg-dark-900 border border-dark-700 rounded-xl px-4 py-2.5 text-white focus:border-blue-500 focus:ring-blue-500" placeholder="+/- Qty">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">HPP / Unit (Opsional untuk Penambahan)</label>
                    <input type="number" id="adjHpp" class="w-full bg-dark-900 border border-dark-700 rounded-xl px-4 py-2.5 text-white focus:border-blue-500 focus:ring-blue-500" placeholder="Biarkan kosong pakai HPP lama">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Catatan / Alasan</label>
                    <textarea id="adjMemo" class="w-full bg-dark-900 border border-dark-700 rounded-xl px-4 py-2.5 text-white focus:border-blue-500 focus:ring-blue-500" placeholder="Misal: Barang rusak, selisih opname"></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-dark-700 bg-dark-800 flex justify-end space-x-3">
                <button onclick="closeAdjustmentModal()" class="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-300 hover:bg-dark-700 transition-colors">Batal</button>
                <button onclick="saveAdjustment()" class="px-5 py-2.5 rounded-xl text-sm font-medium text-white bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-500/20 transition-colors">Simpan Penyesuaian</button>
            </div>
        </div>
    </div>

    <!-- Scripts (order matters) -->
    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/coa-engine.js"></script>
    <script src="../js/inventory-engine.js"></script>
    <script src="../js/produk-engine.js"></script>
    <script src="../js/inventori-ui.js"></script>
    <script src="../js/theme.js"></script>
</body>
</html>
