<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan - Vitta ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { dark: { 900: '#111827', 800: '#1f2937', 700: '#374151', 600: '#4b5563' }, primary: '#3b82f6', accent: '#8b5cf6' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        @media print {
            body { background: white !important; color: black !important; }
            #sidebar-container, header, .print-hide { display: none !important; }
            .print-area { background: white !important; padding: 0 !important; color: black !important; }
            .print-text-dark { color: black !important; }
            .print-border { border-color: #ddd !important; }
        }
    </style>
</head>
<body class="bg-dark-900 text-gray-100 font-sans min-h-screen flex">
    
    <div id="sidebar-container" class="shrink-0"></div>

    <div class="flex-1 flex flex-col h-screen overflow-hidden bg-dark-900">
        <!-- Header -->
        <header class="bg-dark-800 border-b border-dark-700 p-4 md:p-6 flex justify-between items-center shrink-0 sticky top-0 z-10">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="mr-4 text-gray-400 hover:text-white lg:hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-white tracking-tight">Laporan Keuangan</h1>
                    <p class="text-xs md:text-sm text-gray-400 hidden md:block">Analisis Laba Rugi dan Neraca standar</p>
                </div>
            </div>
            <div class="flex space-x-2">
                <button onclick="window.print()" class="bg-dark-700 hover:bg-dark-600 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-lg flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Cetak PDF
                </button>
            </div>
        </header>

        <!-- Main Scrollable Area -->
        <main class="flex-1 overflow-y-auto p-6 print-area">
            
            <div class="max-w-4xl mx-auto space-y-6">
                <!-- Controls -->
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-dark-800 p-4 rounded-xl border border-dark-700 print-hide">
                    <div class="flex space-x-2 w-full md:w-auto">
                        <select class="report-input w-48" id="reportTypeSelect" onchange="toggleReport(this.value)">
                            <option value="pl">Laba Rugi (Profit/Loss)</option>
                            <option value="bs">Neraca (Balance Sheet)</option>
                            <option value="cf">Arus Kas (Cash Flow)</option>
                            <option value="sales">Penjualan</option>
                            <option value="purchases">Pembelian</option>
                        </select>
                        <input type="month" id="filterMonth" class="report-input" value="">
                    </div>
                    <div>
                        <button onclick="generateReports()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Terapkan Filter</button>
                    </div>
                </div>

                <!-- LABA RUGI (P&L) REPORT -->
                <div id="reportPL" class="report-container bg-dark-800 print-border border border-dark-700 rounded-xl p-8 shadow-sm"></div>

                <!-- NERACA (BALANCE SHEET) REPORT -->
                <div id="reportBS" class="report-container hidden bg-dark-800 print-border border border-dark-700 rounded-xl p-8 shadow-sm"></div>

                <!-- ARUS KAS (CASH FLOW) REPORT -->
                <div id="reportCF" class="report-container hidden bg-dark-800 print-border border border-dark-700 rounded-xl p-8 shadow-sm"></div>

                <!-- PENJUALAN REPORT -->
                <div id="reportSales" class="report-container hidden bg-dark-800 print-border border border-dark-700 rounded-xl p-8 shadow-sm"></div>

                <!-- PEMBELIAN REPORT -->
                <div id="reportPurchases" class="report-container hidden bg-dark-800 print-border border border-dark-700 rounded-xl p-8 shadow-sm"></div>

            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/coa-engine.js"></script>
    <script src="../js/journal-engine.js"></script>
    <script src="../js/invoice-engine.js"></script>
    <script src="../js/pembelian-engine.js"></script>
    <script src="../js/laporan-engine.js"></script>
    <script src="../js/laporan-ui.js"></script>
    <script src='../js/theme.js'></script>
</body>
</html>
