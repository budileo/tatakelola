<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aset Tetap - Vitta ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { dark: { 900: '#111827', 800: '#1f2937', 700: '#374151', 600: '#4b5563' }, primary: '#3b82f6', accent: '#8b5cf6' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-dark-900 text-gray-100 font-sans min-h-screen flex">
    
    <div id="sidebar-container" class="shrink-0"></div>

    <div class="flex-1 flex flex-col h-screen overflow-hidden bg-dark-900">
        <!-- Header -->
        <header class="bg-dark-800 border-b border-dark-700 p-4 md:p-6 flex justify-between items-center shrink-0 sticky top-0 z-10">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="mr-4 text-gray-400 hover:text-white lg:hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-white tracking-tight">Aset Tetap & Penyusutan</h1>
                    <p class="text-xs md:text-sm text-gray-400 hidden md:block">Register aset perusahaan dan kalkulasi nilai buku otomatis</p>
                </div>
            </div>
            <div>
                <button onclick="toggleView('form')" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-lg shadow-purple-500/20 flex items-center">
                    <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Daftarkan Aset
                </button>
            </div>
        </header>

        <!-- Main Scrollable Area -->
        <main class="flex-1 overflow-y-auto p-6">
            
            <!-- LIST VIEW -->
            <div id="listView" class="max-w-7xl mx-auto space-y-6">
                <!-- Filters & Search -->
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-dark-800 p-4 rounded-xl border border-dark-700">
                    <div class="flex space-x-2 w-full md:w-auto">
                        <input type="text" placeholder="Cari Aset..." class="asset-input w-full md:w-64">
                    </div>
                </div>

                <!-- Table -->
                <div class="bg-dark-800 border border-dark-700 rounded-xl overflow-hidden shadow-sm">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-gray-300">
                            <thead class="bg-dark-700/50 text-gray-400 border-b border-dark-700 text-xs uppercase tracking-wider">
                                <tr>
                                    <th class="px-6 py-4 font-semibold">No Aset</th>
                                    <th class="px-6 py-4 font-semibold">Nama Aset</th>
                                    <th class="px-6 py-4 font-semibold text-right">Harga Perolehan</th>
                                    <th class="px-6 py-4 font-semibold text-right">Akumulasi Penyusutan</th>
                                    <th class="px-6 py-4 font-semibold text-right">Nilai Buku</th>
                                    <th class="px-6 py-4 font-semibold text-center">Status</th>
                                    <th class="px-6 py-4 font-semibold text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="assetTableBody" class="divide-y divide-dark-700">
                                <!-- Data aset dinamis akan diinjeksi di sini -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- FORM VIEW -->
            <div id="formView" class="hidden max-w-3xl mx-auto">
                <div class="mb-4">
                    <button onclick="toggleView('list')" class="text-gray-400 hover:text-white flex items-center transition-colors">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Kembali ke Daftar
                    </button>
                </div>

                <div class="bg-dark-800 border border-dark-700 rounded-2xl shadow-xl overflow-hidden">
                    <div class="p-6 border-b border-dark-700 bg-dark-800/50">
                        <h2 class="text-xl font-bold text-white">Registrasi Aset Baru</h2>
                    </div>
                    
                    <div class="p-6 space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-medium text-gray-400 mb-1">Nama Aset</label>
                                <input type="text" id="inputAssetNama" class="asset-input" placeholder="Misal: Mobil Operasional">
                            </div>
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-medium text-gray-400 mb-1">Nomor Aset</label>
                                <input type="text" id="inputAssetNo" class="asset-input text-gray-500 bg-dark-800" value="AUTO" readonly>
                            </div>
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-medium text-gray-400 mb-1">Tanggal Pembelian</label>
                                <input type="date" id="inputAssetTanggal" class="asset-input">
                            </div>
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-medium text-gray-400 mb-1">Harga Perolehan (Rp)</label>
                                <input type="number" id="inputAssetHarga" class="asset-input" placeholder="0">
                            </div>
                        </div>

                        <!-- Pengaturan Akuntansi -->
                        <div class="bg-dark-900/50 p-4 rounded-xl border border-dark-700 space-y-4 mt-6">
                            <h3 class="text-sm font-semibold text-gray-300 border-b border-dark-700 pb-2">Pengaturan Penyusutan</h3>
                            
                            <div class="flex items-center mb-4">
                                <input type="checkbox" id="enableDepreciation" class="h-4 w-4 rounded border-gray-300 text-purple-600 bg-dark-900" onchange="toggleDepreciation()" checked>
                                <label class="ml-2 block text-sm text-gray-300 font-medium">Aktifkan Penyusutan Otomatis Bulanan</label>
                            </div>

                            <div id="depreciationSettings" class="grid grid-cols-2 gap-4">
                                <div class="col-span-2 md:col-span-1">
                                    <label class="block text-sm font-medium text-gray-400 mb-1">Metode</label>
                                    <select id="inputAssetMetode" class="asset-input">
                                        <option value="straight">Garis Lurus (Straight Line)</option>
                                        <option value="declining">Saldo Menurun (Declining Balance)</option>
                                    </select>
                                </div>
                                <div class="col-span-2 md:col-span-1">
                                    <label class="block text-sm font-medium text-gray-400 mb-1">Umur Ekonomis (Bulan)</label>
                                    <input type="number" id="inputAssetUmur" class="asset-input" placeholder="Masa pakai...">
                                </div>
                                <div class="col-span-2 md:col-span-1">
                                    <label class="block text-sm font-medium text-gray-400 mb-1">Nilai Residu / Sisa (Rp)</label>
                                    <input type="number" id="inputAssetResidu" class="asset-input" value="0">
                                </div>
                                <div class="col-span-2 md:col-span-1">
                                    <label class="block text-sm font-medium text-gray-400 mb-1">Akun Beban Penyusutan</label>
                                    <select id="inputAssetAkun" class="asset-input">
                                        <option value="6-60502">6-60502 - Penyusutan - Kendaraan</option>
                                        <option value="6-60504">6-60504 - Penyusutan - Peralatan Kantor</option>
                                        <option value="6-60500">6-60500 - Penyusutan - Bangunan</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-6 border-t border-dark-700 bg-dark-800 flex justify-end space-x-3">
                        <button onclick="toggleView('list')" class="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-300 hover:bg-dark-700 transition-colors">Batal</button>
                        <button onclick="saveAsset()" class="px-5 py-2.5 rounded-xl text-sm font-medium text-white bg-purple-600 hover:bg-purple-500 shadow-lg shadow-purple-500/20 transition-colors flex items-center">
                            Simpan Aset
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        const scopedKey = window.getScopedKey ? window.getScopedKey('vitta_assets') : 'vitta_assets';
        let assets = [];

        function loadAssets() {
            const raw = localStorage.getItem(scopedKey);
            if (raw) {
                try {
                    assets = JSON.parse(raw);
                } catch(e) { assets = []; }
            } else {
                assets = [];
            }
        }

        const formatRp = (num) => 'Rp ' + Math.round(num || 0).toLocaleString('id-ID');

        function renderTable() {
            loadAssets();
            const tbody = document.getElementById('assetTableBody');
            if (!tbody) return;

            tbody.innerHTML = '';
            if (assets.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                            Belum ada aset tetap yang didaftarkan. Klik "Daftarkan Aset" untuk memulai!
                        </td>
                    </tr>
                `;
                return;
            }

            assets.forEach(a => {
                const statusBadge = a.status === 'ACTIVE'
                    ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">Aktif</span>`
                    : `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-500/10 text-gray-400 border border-gray-500/20">Nonaktif</span>`;

                tbody.innerHTML += `
                    <tr class="hover:bg-dark-700/30 transition-colors">
                        <td class="px-6 py-4 font-medium text-white">${a.asset_no}</td>
                        <td class="px-6 py-4">${a.name}</td>
                        <td class="px-6 py-4 text-right">${formatRp(a.purchase_price)}</td>
                        <td class="px-6 py-4 text-right text-rose-400">${formatRp(a.accum_dep)}</td>
                        <td class="px-6 py-4 text-right text-emerald-400 font-medium">${formatRp(a.book_value)}</td>
                        <td class="px-6 py-4 text-center">${statusBadge}</td>
                        <td class="px-6 py-4 text-center">
                            <button class="text-blue-400 hover:text-blue-300" onclick="viewAsset('${a.id}')">Lihat</button>
                        </td>
                    </tr>
                `;
            });
        }

        function getNextAssetNo() {
            const count = assets.length + 1;
            return 'FA' + String(count).padStart(5, '0');
        }

        function toggleView(view) {
            if (view === 'form') {
                document.getElementById('listView').classList.add('hidden');
                document.getElementById('formView').classList.remove('hidden');
                document.getElementById('formView').classList.add('animate-fade-in-up');
                
                // Set default asset no
                document.getElementById('inputAssetNo').value = getNextAssetNo();
                document.getElementById('inputAssetTanggal').value = new Date().toISOString().split('T')[0];
            } else {
                document.getElementById('formView').classList.add('hidden');
                document.getElementById('listView').classList.remove('hidden');
                renderTable();
            }
        }

        function toggleDepreciation() {
            const isChecked = document.getElementById('enableDepreciation').checked;
            const settings = document.getElementById('depreciationSettings');
            if(isChecked) {
                settings.style.opacity = '1';
                settings.style.pointerEvents = 'auto';
            } else {
                settings.style.opacity = '0.5';
                settings.style.pointerEvents = 'none';
            }
        }

        function saveAsset() {
            const name = document.getElementById('inputAssetNama').value;
            const tanggal = document.getElementById('inputAssetTanggal').value;
            const harga = parseFloat(document.getElementById('inputAssetHarga').value) || 0;
            const enableDep = document.getElementById('enableDepreciation').checked;
            const metode = document.getElementById('inputAssetMetode').value;
            const umur = parseInt(document.getElementById('inputAssetUmur').value) || 12;
            const residu = parseFloat(document.getElementById('inputAssetResidu').value) || 0;
            const akun = document.getElementById('inputAssetAkun').value;

            if (!name || !tanggal || harga <= 0) {
                alert("Mohon isi Nama, Tanggal, dan Harga perolehan aset dengan benar.");
                return;
            }

            let accumDep = 0;
            if (enableDep) {
                const buyDate = new Date(tanggal);
                const today = new Date();
                const diffMonths = (today.getFullYear() - buyDate.getFullYear()) * 12 + today.getMonth() - buyDate.getMonth();
                const monthsElapsed = Math.max(0, diffMonths);

                const monthlyDep = (harga - residu) / umur;
                accumDep = Math.min(harga - residu, monthlyDep * monthsElapsed);
            }

            const bookValue = harga - accumDep;
            const newAsset = {
                id: 'FA_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 4),
                asset_no: getNextAssetNo(),
                name: name,
                purchase_date: tanggal,
                purchase_price: harga,
                accum_dep: accumDep,
                book_value: bookValue,
                status: 'ACTIVE'
            };

            assets.push(newAsset);
            localStorage.setItem(scopedKey, JSON.stringify(assets));

            if (window.recordJournal) {
                let assetCoaCode = '1-10704'; // Mesin & Peralatan
                if (akun === '6-60502') assetCoaCode = '1-10703'; // Kendaraan
                else if (akun === '6-60504') assetCoaCode = '1-10705'; // Peralatan Kantor
                else if (akun === '6-60500') assetCoaCode = '1-10701'; // Bangunan

                try {
                    window.recordJournal({
                        date: tanggal,
                        memo: `Pembelian Aset Tetap: ${name} (${newAsset.asset_no})`,
                        lines: [
                            { account: assetCoaCode, accountName: 'Aset Tetap', debit: harga, credit: 0 },
                            { account: '1-10001', accountName: 'Kas', debit: 0, credit: harga }
                        ],
                        refId: newAsset.id,
                        type: 'ASSET_PURCHASE'
                    });
                } catch(je) {
                    console.error("Gagal menjurnal pembelian aset:", je);
                }
            }

            alert("Aset berhasil didaftarkan dan disimpan.");
            toggleView('list');
        }

        function viewAsset(id) {
            const a = assets.find(item => item.id === id);
            if (!a) return;
            alert(`Aset: ${a.name} (${a.asset_no})\nTanggal Beli: ${a.purchase_date}\nHarga: ${formatRp(a.purchase_price)}\nAkumulasi Penyusutan: ${formatRp(a.accum_dep)}\nNilai Buku: ${formatRp(a.book_value)}`);
        }

        // Pemicu dari auto-renderer di auth.js
        window.renderTable = function() {
            renderTable();
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderTable();
        });
    </script>
    <script src='../js/theme.js'></script>
</body>
</html>
